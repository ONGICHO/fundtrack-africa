version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fundtrack-db
    environment:
      POSTGRES_DB: fundtrack_africa
      POSTGRES_USER: fundtrack_user
      POSTGRES_PASSWORD: fundtrack_secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundtrack_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fundtrack-network

  # Backend API (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundtrack-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://fundtrack_user:fundtrack_secure_password_2024@postgres:5432/fundtrack_africa
      JWT_SECRET: your_jwt_secret_key_here
      ML_ENGINE_URL: http://ml-engine:8000
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - fundtrack-network
    command: npm run dev

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fundtrack-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_ML_ENGINE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fundtrack-network
    command: npm start

  # ML Engine (Python/FastAPI)
  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: fundtrack-ml-engine
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://fundtrack_user:fundtrack_secure_password_2024@postgres:5432/fundtrack_africa
      ML_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ml-engine:/app
      - ml_models:/app/models
    networks:
      - fundtrack-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fundtrack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fundtrack-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: fundtrack-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fundtrack-network

  # Adminer (Database UI - optional)
  adminer:
    image: adminer:latest
    container_name: fundtrack-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - fundtrack-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
  redis_data:
  ml_models:

networks:
  fundtrack-network:
    driver: bridge